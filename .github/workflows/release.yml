---
name: sonar-release
# This workflow is triggered by SonarSource/release-github-actions/publish-github-release,
# which creates a draft GitHub release and then dispatches this workflow.
# gh-action_release@v7 reuses the draft, attaches assets, and atomically publishes it.
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Full version including build number, e.g. 1.2.3.456
        required: true
      dryRun:
        type: boolean
        description: Flag to enable the dry-run execution
        default: false
        required: false

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@v7
    with:
      version: ${{ inputs.version }}
      dryRun: ${{ inputs.dryRun }}
      publishToBinaries: true
      mavenCentralSync: true
      slackChannel: squad-security-taint-notifs
